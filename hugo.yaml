# Hugo configuration file
title: Luan Costa

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: Search
      weight: 5
      params:
        type: search
    - name: Linkedin
      weight: 2
      url: "https://www.linkedin.com/in/luanhcosta"
      params:
        icon: linkedin
    - name: Twitter
      weight: 3
      url: "https://x.com/luanh_costa61"
      params:
        icon: x-twitter
    - name: GitHub
      weight: 4
      url: "https://github.com/luanhcosta"
      params:
        icon: github
    - name: Theme
      weight: 6
      params:
        type: theme-toggle

params:
  navbar:
    displayTitle: true
    displayLogo: false
  theme:
    displayToggle: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false
